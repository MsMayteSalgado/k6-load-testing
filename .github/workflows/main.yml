name: k6 distributed test

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL (include trailing slash)"
        required: false
        default: "https://example.com/"

      vus:
        description: "Virtual users"
        required: false
        default: "50"

      duration:
        description: "Test duration"
        required: false
        default: "10s"

      regions:
        description: "Comma-separated region labels"
        required: false
        default: "us-east,eu-west"

      instances:
        description: "Comma-separated instance IDs"
        required: false
        default: "1,2"

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      regions_json: ${{ steps.set.outputs.regions }}
      instances_json: ${{ steps.set.outputs.instances }}

    steps:
      - id: set
        run: |
          regions='["'$(echo "${{ github.event.inputs.regions }}" | sed 's/,/","/g')'"]'
          instances='["'$(echo "${{ github.event.inputs.instances }}" | sed 's/,/","/g')'"]'

          echo "regions=$regions" >> $GITHUB_OUTPUT
          echo "instances=$instances" >> $GITHUB_OUTPUT

  load-test:
    needs: prepare-matrix
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        region: ${{ fromJson(needs.prepare-matrix.outputs.regions_json) }}
        instance: ${{ fromJson(needs.prepare-matrix.outputs.instances_json) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Public IP
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "Public IP: $IP"
          echo "Region: ${{ matrix.region }} | Instance: ${{ matrix.instance }}"

      - name: Prepare wordlist
        run: |
          mkdir -p wordlists

          if [ -f wordlists/common.txt ]; then
            cp wordlists/common.txt wordlists/base.txt
          else
            touch wordlists/base.txt
          fi

          BASE=${{ github.event.inputs.target_url }}

          if curl -f -s "$BASE/sitemap.xml" -o sitemap.xml; then
            grep -oP '(?<=<loc>).*?(?=</loc>)' sitemap.xml \
              | sed "s#https\?://[^/]*##" \
              >> wordlists/base.txt
          fi

          sort -u wordlists/base.txt > wordlists/common.txt

          if [ ! -s wordlists/common.txt ]; then
            echo "/" > wordlists/common.txt
          fi

      - name: Install k6
        run: |
          K6_VER="v0.51.0"
          curl -fsSL "https://github.com/grafana/k6/releases/download/${K6_VER}/k6-${K6_VER}-linux-amd64.tar.gz" | tar -xz
          sudo mv "k6-${K6_VER}-linux-amd64/k6" /usr/local/bin/k6

      - name: Run k6
        continue-on-error: true
        run: |
          k6 run \
            -e TARGET_URL=${{ github.event.inputs.target_url }} \
            -e VUS=${{ github.event.inputs.vus }} \
            -e DURATION=${{ github.event.inputs.duration }} \
            --summary-export=summary-${{ matrix.region }}-${{ matrix.instance }}.json \
            --out json=raw-${{ matrix.region }}-${{ matrix.instance }}.json \
            script.js

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-${{ matrix.region }}-${{ matrix.instance }}
          path: "*.json"

  aggregate-summary:
    needs: load-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y jq bc

      # ✅ FIX PERMISSION ISSUE
      - name: Make script executable
        run: chmod +x .github/scripts/k6-aggregate.sh

      # ✅ SAFE EXECUTION
      - name: Run aggregation
        run: bash .github/scripts/k6-aggregate.sh results

      # ✅ AUTO CLEAN WORDLIST
      - name: Clean wordlist
        run: |
          echo "Extracting bad paths..."

          find results -name "notfound-endpoints.json" -exec cat {} \; 2>/dev/null \
            | jq -s 'add // {} | keys[]' \
            | sort -u > bad.txt

          if [ ! -s bad.txt ]; then
            echo "No bad paths"
            exit 0
          fi

          grep -v -F -f bad.txt wordlists/common.txt > clean.txt || true

          if [ ! -s clean.txt ]; then
            echo "/" > clean.txt
          fi

          mv clean.txt wordlists/common.txt

          echo "Cleaned wordlist:"
          wc -l wordlists/common.txt

      # ✅ COMMIT BACK
      - name: Commit cleaned wordlist
        if: github.actor != 'github-actions[bot]'
        run: |
          git config --global user.name "k6-bot"
          git config --global user.email "k6-bot@users.noreply.github.com"

          git add wordlists/common.txt

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "auto-clean: remove bad endpoints"
          git push