name: k6 distributed test

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL (include trailing slash)"
        required: false
        default: "https://example.com/"

      vus:
        description: "Virtual users"
        required: false
        default: "50"

      duration:
        description: "Test duration"
        required: false
        default: "10s"

      regions:
        description: "Comma-separated region labels"
        required: false
        default: "us-east,eu-west"

      instances:
        description: "Comma-separated instance IDs"
        required: false
        default: "1,2"

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      regions_json: ${{ steps.set.outputs.regions }}
      instances_json: ${{ steps.set.outputs.instances }}

    steps:
      - id: set
        run: |
          regions='["'$(echo "${{ github.event.inputs.regions }}" | sed 's/,/","/g')'"]'
          instances='["'$(echo "${{ github.event.inputs.instances }}" | sed 's/,/","/g')'"]'

          echo "regions=$regions" >> $GITHUB_OUTPUT
          echo "instances=$instances" >> $GITHUB_OUTPUT

  load-test:
    needs: prepare-matrix
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        region: ${{ fromJson(needs.prepare-matrix.outputs.regions_json) }}
        instance: ${{ fromJson(needs.prepare-matrix.outputs.instances_json) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Make scripts executable
        run: chmod +x .github/scripts/*.sh

      # ✅ PUBLIC IP
      - name: Get public IP
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "Public IP: $IP"
          echo "Region: ${{ matrix.region }} | Instance: ${{ matrix.instance }}"

      # ✅ Generate common.txt from sitemap
      - name: Generate wordlist
        run: |
          mkdir -p wordlists

          BASE=${{ github.event.inputs.target_url }}

          curl -s "$BASE/sitemap.xml" > sitemap.xml || true

          grep -oP '(?<=<loc>).*?(?=</loc>)' sitemap.xml \
            | sed "s#$BASE##" \
            | sed 's#^$#/#' \
            | sort -u \
            > wordlists/common.txt

          # fallback if empty
          if [ ! -s wordlists/common.txt ]; then
            echo "/" > wordlists/common.txt
          fi

          echo "Total paths:"
          wc -l wordlists/common.txt

      - name: Install k6
        run: |
          K6_VER="v0.51.0"
          curl -fsSL "https://github.com/grafana/k6/releases/download/${K6_VER}/k6-${K6_VER}-linux-amd64.tar.gz" | tar -xz
          sudo mv "k6-${K6_VER}-linux-amd64/k6" /usr/local/bin/k6

      - name: Run k6 test
        continue-on-error: true
        run: |
          k6 run \
            -e TARGET_URL=${{ github.event.inputs.target_url }} \
            -e VUS=${{ github.event.inputs.vus }} \
            -e DURATION=${{ github.event.inputs.duration }} \
            -e REGION=${{ matrix.region }} \
            -e INSTANCE=${{ matrix.instance }} \
            --summary-export=summary-${{ matrix.region }}-${{ matrix.instance }}.json \
            --out json=raw-${{ matrix.region }}-${{ matrix.instance }}.json \
            script.js

      - name: Write job summary
        if: always()
        run: |
          FILE=summary-${{ matrix.region }}-${{ matrix.instance }}.json
          .github/scripts/k6-summary.sh "$FILE" "${{ matrix.region }}" "${{ matrix.instance }}"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results-${{ matrix.region }}-${{ matrix.instance }}
          path: |
            summary-*.json
            raw-*.json

  aggregate-summary:
    needs: load-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Debug files
        run: find results -name "*.json"

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y jq bc

      - name: Make scripts executable
        run: chmod +x .github/scripts/*.sh

      - name: Run aggregation
        run: |
          .github/scripts/k6-aggregate.sh results