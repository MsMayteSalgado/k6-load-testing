name: k6 distributed test

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL (include trailing slash)"
        required: false
        default: "https://example.com/"

      vus:
        description: "Virtual users"
        required: false
        default: "50"

      duration:
        description: "Test duration"
        required: false
        default: "10s"

      regions:
        description: "Comma-separated region labels"
        required: false
        default: "us-east,eu-west"

      instances:
        description: "Comma-separated instance IDs"
        required: false
        default: "1,2"

      use_sitemap:
        description: "Load paths from sitemap.xml if available"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      use_wordlist:
        description: "Use wordlists/common.txt when sitemap is absent (or disabled)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      regions_json: ${{ steps.set.outputs.regions }}
      instances_json: ${{ steps.set.outputs.instances }}
      total_instances: ${{ steps.set.outputs.total_instances }}

    steps:
      - id: set
        run: |
          regions='["'$(echo "${{ github.event.inputs.regions }}" | sed 's/,/","/g')'"]'
          instances='["'$(echo "${{ github.event.inputs.instances }}" | sed 's/,/","/g')'"]'
          total=$(echo "${{ github.event.inputs.instances }}" | tr ',' '\n' | wc -l | tr -d ' ')

          echo "regions=$regions"       >> $GITHUB_OUTPUT
          echo "instances=$instances"   >> $GITHUB_OUTPUT
          echo "total_instances=$total" >> $GITHUB_OUTPUT

  load-test:
    needs: prepare-matrix
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        region: ${{ fromJson(needs.prepare-matrix.outputs.regions_json) }}
        instance: ${{ fromJson(needs.prepare-matrix.outputs.instances_json) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Public IP
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "Public IP: $IP"
          echo "Region: ${{ matrix.region }} | Instance: ${{ matrix.instance }}"

      - name: Install k6
        run: |
          K6_VER="v0.51.0"
          curl -fsSL "https://github.com/grafana/k6/releases/download/${K6_VER}/k6-${K6_VER}-linux-amd64.tar.gz" | tar -xz
          sudo mv "k6-${K6_VER}-linux-amd64/k6" /usr/local/bin/k6

      - name: Run k6
        continue-on-error: true
        run: |
          k6 run \
            -e TARGET_URL=${{ github.event.inputs.target_url }} \
            -e VUS=${{ github.event.inputs.vus }} \
            -e DURATION=${{ github.event.inputs.duration }} \
            -e INSTANCE=${{ matrix.instance }} \
            -e TOTAL_INSTANCES=${{ needs.prepare-matrix.outputs.total_instances }} \
            -e USE_SITEMAP=${{ github.event.inputs.use_sitemap }} \
            -e USE_WORDLIST=${{ github.event.inputs.use_wordlist }} \
            --summary-export=summary-${{ matrix.region }}-${{ matrix.instance }}.json \
            --out json=raw-${{ matrix.region }}-${{ matrix.instance }}.json \
            script.js

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-${{ matrix.region }}-${{ matrix.instance }}
          path: "*.json"

  aggregate-summary:
    needs: load-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y jq bc

      - name: Make script executable
        run: chmod +x .github/scripts/k6-aggregate.sh

      - name: Run aggregation
        run: bash .github/scripts/k6-aggregate.sh results
